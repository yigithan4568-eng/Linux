name: Build RootFS from Scratch

on:
  push:
    branches: [main]
  workflow_dispatch:

# ─── Versiyon sabitleme ────────────────────────────────────────────────────────
env:
  ARCH:          x86_64
  TARGET:        x86_64-linux-gnu

  GLIBC_VER:     2.39
  BUSYBOX_VER:   1.36.1
  OPENRC_VER:    0.54
  WGET_VER:      1.21.4
  CURL_VER:      8.7.1
  NANO_VER:      7.2
  GIT_VER:       2.44.0
  ZLIB_VER:      1.3.1
  OPENSSL_VER:   3.3.0
  LIBCAP_VER:    2.69
  LINUX_HDR_VER: 6.6.30

  SYSROOT:   ${{ github.workspace }}/sysroot
  ROOTFS:    ${{ github.workspace }}/rootfs
  SOURCES:   ${{ github.workspace }}/sources

jobs:
  build-rootfs:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:

    # ──────────────────────────────────────────────────────────────────────────
    # 0. Bağımlılıklar
    # ──────────────────────────────────────────────────────────────────────────
   - name: Build bağımlılıklarını kur
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          autoconf automake bison build-essential \
          ca-certificates cpio curl file flex \
          gawk gettext git gperf help2man \
          libexpat1-dev libffi-dev libssl-dev \
          libselinux-dev \
          libtool libz-dev make ninja-build \
          patch pkg-config python3 rsync \
          squashfs-tools texinfo unzip wget xz-utils \
          meson

    - name: Dizinleri oluştur
      run: |
        mkdir -p "$SYSROOT" "$ROOTFS" "$SOURCES"
        mkdir -p "$ROOTFS"/{bin,sbin,lib,lib64}
        mkdir -p "$ROOTFS"/usr/{bin,sbin,lib,include}
        mkdir -p "$ROOTFS"/etc/{init.d,runlevels/{boot,default,nonetwork,shutdown,sysinit}}
        mkdir -p "$ROOTFS"/{dev,proc,sys,run,tmp,home,root,mnt,media,opt}
        mkdir -p "$ROOTFS"/var/{log,run}
        chmod 1777 "$ROOTFS/tmp"

    # ──────────────────────────────────────────────────────────────────────────
    # 1. Linux kernel başlıkları
    # ──────────────────────────────────────────────────────────────────────────
    - name: Linux başlıklarını indir ve kur
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${LINUX_HDR_VER}.tar.xz"
        tar -xf "linux-${LINUX_HDR_VER}.tar.xz"
        cd "linux-${LINUX_HDR_VER}"
        make ARCH=x86_64 INSTALL_HDR_PATH="$SYSROOT/usr" headers_install
        make ARCH=x86_64 INSTALL_HDR_PATH="$ROOTFS/usr" headers_install

    # ──────────────────────────────────────────────────────────────────────────
    # 2. glibc
    # ──────────────────────────────────────────────────────────────────────────
    - name: glibc indir
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://ftp.gnu.org/gnu/glibc/glibc-${GLIBC_VER}.tar.xz"
        tar -xf "glibc-${GLIBC_VER}.tar.xz"

    - name: glibc derle ve kur
      working-directory: ${{ env.SOURCES }}
      run: |
        mkdir -p glibc-build && cd glibc-build
        ../glibc-${GLIBC_VER}/configure \
          --prefix=/usr \
          --host=x86_64-linux-gnu \
          --build=x86_64-linux-gnu \
          --with-headers="$SYSROOT/usr/include" \
          --disable-werror \
          --enable-kernel=5.15 \
          --disable-multi-arch \
          libc_cv_slibdir=/lib \
          libc_cv_rtlddir=/lib
        make -j$(nproc)
        make install DESTDIR="$ROOTFS"
        make install DESTDIR="$SYSROOT"

    # ──────────────────────────────────────────────────────────────────────────
    # 3. zlib
    # ──────────────────────────────────────────────────────────────────────────
    - name: zlib derle
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://zlib.net/zlib-${ZLIB_VER}.tar.gz"
        tar -xf "zlib-${ZLIB_VER}.tar.gz"
        cd "zlib-${ZLIB_VER}"
        CFLAGS="-Os" ./configure --prefix=/usr --shared
        make -j$(nproc)
        make install DESTDIR="$SYSROOT"
        make install DESTDIR="$ROOTFS"

    # ──────────────────────────────────────────────────────────────────────────
    # 4. OpenSSL
    # ──────────────────────────────────────────────────────────────────────────
    - name: OpenSSL derle
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://www.openssl.org/source/openssl-${OPENSSL_VER}.tar.gz"
        tar -xf "openssl-${OPENSSL_VER}.tar.gz"
        cd "openssl-${OPENSSL_VER}"
        CFLAGS="-Os" ./Configure \
          linux-x86_64 \
          --prefix=/usr \
          --openssldir=/etc/ssl \
          shared \
          no-tests \
          no-docs \
          no-engine \
          no-static-engine \
          -DOPENSSL_NO_HEARTBEATS
        make -j$(nproc)
        make install DESTDIR="$SYSROOT"
        make install DESTDIR="$ROOTFS"
        rm -rf "$ROOTFS/usr/include/openssl"
        find "$ROOTFS/usr/lib" -name "*.a" -delete

    # ──────────────────────────────────────────────────────────────────────────
    # 5. libcap (OpenRC bağımlılığı)
    # ──────────────────────────────────────────────────────────────────────────
    - name: libcap derle
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://mirrors.edge.kernel.org/pub/linux/libs/security/linux-privs/libcap2/libcap-${LIBCAP_VER}.tar.xz"
        tar -xf "libcap-${LIBCAP_VER}.tar.xz"
        cd "libcap-${LIBCAP_VER}"
        make -j$(nproc) CFLAGS="-Os" prefix=/usr lib=lib DYNAMIC=yes STATIC=no
        make install DESTDIR="$SYSROOT" prefix=/usr lib=lib
        make install DESTDIR="$ROOTFS"  prefix=/usr lib=lib
        find "$ROOTFS/usr/lib" -name "*.a" -delete

    # ──────────────────────────────────────────────────────────────────────────
    # 6. BusyBox
    # ──────────────────────────────────────────────────────────────────────────
    - name: BusyBox indir
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://busybox.net/downloads/busybox-${BUSYBOX_VER}.tar.bz2"
        tar -xf "busybox-${BUSYBOX_VER}.tar.bz2"

    - name: BusyBox derle ve kur
      working-directory: ${{ env.SOURCES }}/busybox-${{ env.BUSYBOX_VER }}
      run: |
        make defconfig
        # OpenRC init kullanacağız; BusyBox init'i kapat
        scripts/config --disable INIT
        scripts/config --disable FEATURE_USE_INITTAB
        scripts/config --disable SYSVINIT
        # Dinamik link (glibc)
        scripts/config --disable STATIC
        # Boyut küçültme
        scripts/config --enable FEATURE_COMPRESS_USAGE
        scripts/config --disable DEBUG
        scripts/config --disable DEBUG_SANITIZE
        yes "" | make oldconfig
        make -j$(nproc) \
          CFLAGS="-Os -I$SYSROOT/usr/include" \
          LDFLAGS="-L$SYSROOT/usr/lib -L$SYSROOT/lib"
        make install CONFIG_PREFIX="$ROOTFS"
        rm -f "$ROOTFS/sbin/init" "$ROOTFS/linuxrc"

    # ──────────────────────────────────────────────────────────────────────────
    # 7. OpenRC
    # ──────────────────────────────────────────────────────────────────────────
    - name: OpenRC derle ve kur
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://github.com/OpenRC/openrc/archive/refs/tags/${OPENRC_VER}.tar.gz" \
          -O "openrc-${OPENRC_VER}.tar.gz"
        tar -xf "openrc-${OPENRC_VER}.tar.gz"
        cd "openrc-${OPENRC_VER}"
        meson setup builddir \
          --prefix=/usr \
          --sbindir=/sbin \
          --libdir=/lib \
          -Dpam=false \
          -Dselinux=false \
          -Daudit=false \
          -Dbuildtype=release \
          -Db_ndebug=true \
          --pkg-config-path="$SYSROOT/usr/lib/pkgconfig"
        DESTDIR="$ROOTFS" ninja -C builddir install
        ln -sf /sbin/openrc-init "$ROOTFS/sbin/init"

    # ──────────────────────────────────────────────────────────────────────────
    # 8. wget
    # ──────────────────────────────────────────────────────────────────────────
    - name: wget derle
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://ftp.gnu.org/gnu/wget/wget-${WGET_VER}.tar.gz"
        tar -xf "wget-${WGET_VER}.tar.gz"
        cd "wget-${WGET_VER}"
        CFLAGS="-Os" \
        PKG_CONFIG_PATH="$SYSROOT/usr/lib/pkgconfig" \
        ./configure \
          --prefix=/usr \
          --with-ssl=openssl \
          --disable-nls \
          --disable-rpath \
          --without-libidn \
          --without-libpsl
        make -j$(nproc)
        make install DESTDIR="$ROOTFS"
        strip "$ROOTFS/usr/bin/wget"

    # ──────────────────────────────────────────────────────────────────────────
    # 9. curl
    # ──────────────────────────────────────────────────────────────────────────
    - name: curl derle
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://curl.se/download/curl-${CURL_VER}.tar.xz"
        tar -xf "curl-${CURL_VER}.tar.xz"
        cd "curl-${CURL_VER}"
        CFLAGS="-Os" \
        PKG_CONFIG_PATH="$SYSROOT/usr/lib/pkgconfig" \
        ./configure \
          --prefix=/usr \
          --with-openssl="$SYSROOT/usr" \
          --with-zlib="$SYSROOT/usr" \
          --disable-static \
          --disable-docs \
          --disable-manual \
          --disable-ldap \
          --disable-ldaps \
          --without-brotli \
          --without-nghttp2 \
          --without-libpsl \
          --without-libidn2
        make -j$(nproc)
        make install DESTDIR="$ROOTFS"
        strip "$ROOTFS/usr/bin/curl"
        find "$ROOTFS/usr/lib" -name "libcurl.a" -delete

    # ──────────────────────────────────────────────────────────────────────────
    # 10. nano
    # ──────────────────────────────────────────────────────────────────────────
    - name: nano derle
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://www.nano-editor.org/dist/v7/nano-${NANO_VER}.tar.xz"
        tar -xf "nano-${NANO_VER}.tar.xz"
        cd "nano-${NANO_VER}"
        CFLAGS="-Os" ./configure \
          --prefix=/usr \
          --disable-nls \
          --disable-mouse \
          --without-slang
        make -j$(nproc)
        make install DESTDIR="$ROOTFS"
        strip "$ROOTFS/usr/bin/nano"
        rm -rf "$ROOTFS/usr/share/nano" "$ROOTFS/usr/share/doc"

    # ──────────────────────────────────────────────────────────────────────────
    # 11. git
    # ──────────────────────────────────────────────────────────────────────────
    - name: git derle
      working-directory: ${{ env.SOURCES }}
      run: |
        wget -q "https://mirrors.edge.kernel.org/pub/software/scm/git/git-${GIT_VER}.tar.xz"
        tar -xf "git-${GIT_VER}.tar.xz"
        cd "git-${GIT_VER}"
        CFLAGS="-Os" PKG_CONFIG_PATH="$SYSROOT/usr/lib/pkgconfig" make configure
        ./configure \
          --prefix=/usr \
          --without-tcltk \
          --without-python \
          --without-perl \
          --with-zlib="$SYSROOT/usr" \
          --disable-nls \
          NO_GETTEXT=1 NO_PERL=1 NO_TCLTK=1 NO_PYTHON=1
        make -j$(nproc) CFLAGS="-Os" NO_GETTEXT=1 NO_PERL=1 NO_TCLTK=1 NO_PYTHON=1
        make install DESTDIR="$ROOTFS" NO_GETTEXT=1 NO_PERL=1 NO_TCLTK=1 NO_PYTHON=1
        rm -rf "$ROOTFS/usr/share/git-core/templates"
        find "$ROOTFS/usr/lib/git-core" -name "git-remote-*" ! -name "git-remote-https" -delete
        strip "$ROOTFS/usr/bin/git" 2>/dev/null || true
        find "$ROOTFS/usr/lib/git-core" -type f -executable | xargs strip 2>/dev/null || true

    # ──────────────────────────────────────────────────────────────────────────
    # 12. /etc temel dosyaları
    # ──────────────────────────────────────────────────────────────────────────
    - name: /etc temel dosyaları oluştur
      run: |
        printf 'root:x:0:0:root:/root:/bin/sh\ndaemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\nnobody:x:65534:65534:nobody:/nonexistent:/usr/sbin/nologin\n' \
          > "$ROOTFS/etc/passwd"

        printf 'root:x:0:\ndaemon:x:1:\nnogroup:x:65534:\n' \
          > "$ROOTFS/etc/group"

        printf 'root:*:19000:0:99999:7:::\n' > "$ROOTFS/etc/shadow"
        chmod 640 "$ROOTFS/etc/shadow"

        echo "minilinux" > "$ROOTFS/etc/hostname"

        printf '127.0.0.1\tlocalhost\n127.0.1.1\tminilinux\n::1\t\tlocalhost\n' \
          > "$ROOTFS/etc/hosts"

        printf 'nameserver 1.1.1.1\nnameserver 8.8.8.8\n' \
          > "$ROOTFS/etc/resolv.conf"

        printf 'proc\t/proc\tproc\tdefaults\t0 0\nsysfs\t/sys\tsysfs\tdefaults\t0 0\ndevtmpfs\t/dev\tdevtmpfs\tdefaults\t0 0\ntmpfs\t/tmp\ttmpfs\tmode=1777\t0 0\ntmpfs\t/run\ttmpfs\tdefaults\t0 0\n' \
          > "$ROOTFS/etc/fstab"

        printf 'export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin\nexport HOME=/root\nexport TERM=${TERM:-linux}\nexport LANG=C.UTF-8\nPS1="\\u@\\h:\\w\\$ "\n' \
          > "$ROOTFS/etc/profile"

        printf 'NAME="MiniLinux"\nVERSION="1.0"\nID=minilinux\n' \
          > "$ROOTFS/etc/os-release"

    # ──────────────────────────────────────────────────────────────────────────
    # 13. OpenRC init script'leri
    # ──────────────────────────────────────────────────────────────────────────
    - name: OpenRC init script'leri ve runlevel'lar
      run: |
        write_service() {
          local name="$1" desc="$2" body="$3"
          printf '#!/sbin/openrc-run\ndescription="%s"\n%s\n' "$desc" "$body" \
            > "$ROOTFS/etc/init.d/$name"
          chmod +x "$ROOTFS/etc/init.d/$name"
        }

        write_service devfs "Mount devtmpfs" \
          'depend() { keyword -docker -lxc; }
        start() {
          mount -t devtmpfs devtmpfs /dev 2>/dev/null || true
          mkdir -p /dev/pts /dev/shm
          mount -t devpts devpts /dev/pts -o gid=5,mode=620 2>/dev/null || true
          mount -t tmpfs shm /dev/shm -o mode=1777 2>/dev/null || true
        }'

        write_service procfs "Mount /proc" \
          'depend() { keyword -docker -lxc; }
        start() { mount -t proc proc /proc 2>/dev/null || true; }'

        write_service sysfs "Mount /sys" \
          'depend() { keyword -docker -lxc; }
        start() { mount -t sysfs sysfs /sys 2>/dev/null || true; }'

        write_service hostname "Set hostname" \
          'start() { hostname -F /etc/hostname; }'

        write_service loopback "Loopback interface" \
          'depend() { need devfs; }
        start() { ip link set lo up; ip addr add 127.0.0.1/8 dev lo; }
        stop()  { ip link set lo down; }'

        write_service getty.tty1 "Getty on tty1" \
          'depend() { need devfs procfs; }
        command="/sbin/getty"
        command_args="-L tty1 115200 vt100"
        respawn'

        # Runlevel symlink'leri
        ln -sf /etc/init.d/devfs   "$ROOTFS/etc/runlevels/sysinit/devfs"
        ln -sf /etc/init.d/procfs  "$ROOTFS/etc/runlevels/sysinit/procfs"
        ln -sf /etc/init.d/sysfs   "$ROOTFS/etc/runlevels/sysinit/sysfs"
        ln -sf /etc/init.d/hostname   "$ROOTFS/etc/runlevels/boot/hostname"
        ln -sf /etc/init.d/loopback   "$ROOTFS/etc/runlevels/default/loopback"
        ln -sf /etc/init.d/getty.tty1 "$ROOTFS/etc/runlevels/default/getty.tty1"

    # ──────────────────────────────────────────────────────────────────────────
    # 14. Symlink'ler ve statik /dev node'ları
    # ──────────────────────────────────────────────────────────────────────────
    - name: Symlink ve /dev node'ları
      run: |
        ln -sf lib   "$ROOTFS/lib64"
        ln -sf /lib  "$ROOTFS/usr/lib64"

        sudo mknod -m 666 "$ROOTFS/dev/null"    c 1 3
        sudo mknod -m 666 "$ROOTFS/dev/zero"    c 1 5
        sudo mknod -m 666 "$ROOTFS/dev/random"  c 1 8
        sudo mknod -m 666 "$ROOTFS/dev/urandom" c 1 9
        sudo mknod -m 620 "$ROOTFS/dev/tty1"    c 4 1
        sudo mknod -m 666 "$ROOTFS/dev/tty"     c 5 0
        sudo mknod -m 666 "$ROOTFS/dev/console" c 5 1

    # ──────────────────────────────────────────────────────────────────────────
    # 15. Strip + temizlik
    # ──────────────────────────────────────────────────────────────────────────
    - name: Strip ve boyut temizliği
      run: |
        find "$ROOTFS" -type f | while read f; do
          if file "$f" 2>/dev/null | grep -qE 'ELF.*(executable|shared object)'; then
            strip --strip-unneeded "$f" 2>/dev/null || true
          fi
        done

        rm -rf \
          "$ROOTFS/usr/include" \
          "$ROOTFS/usr/share/man" \
          "$ROOTFS/usr/share/info" \
          "$ROOTFS/usr/share/doc" \
          "$ROOTFS/usr/share/locale" \
          "$ROOTFS/usr/lib/pkgconfig" \
          "$ROOTFS/usr/lib/cmake"

        find "$ROOTFS" -name "*.a" -delete
        find "$ROOTFS" -name "*.la" -delete

        # glibc locale — sadece C.utf8
        find "$ROOTFS/usr/lib/locale" -mindepth 1 -maxdepth 1 \
          ! -name "C.utf8" -exec rm -rf {} + 2>/dev/null || true

        # Timezone — sadece UTC
        find "$ROOTFS/usr/share/zoneinfo" -mindepth 1 \
          ! -name "UTC" ! -name "posixrules" \
          -exec rm -rf {} + 2>/dev/null || true

        echo "=== Rootfs ham boyutu ==="
        du -sh "$ROOTFS"
        echo "=== En büyük 20 dosya ==="
        find "$ROOTFS" -type f -printf '%s %p\n' | sort -rn | head -20

    # ──────────────────────────────────────────────────────────────────────────
    # 16. SquashFS (xz, kernel hariç ~6 MB hedef → toplamda <12 MB)
    # ──────────────────────────────────────────────────────────────────────────
    - name: SquashFS imajı oluştur
      run: |
        sudo mksquashfs "$ROOTFS" rootfs.squashfs \
          -comp xz \
          -Xbcj x86 \
          -b 1M \
          -noappend \
          -no-progress

        echo "=== İmaj boyutu ==="
        ls -lh rootfs.squashfs
        SIZE_KB=$(du -k rootfs.squashfs | cut -f1)
        SIZE_MB=$(echo "scale=2; $SIZE_KB/1024" | bc)
        echo "Boyut: ${SIZE_MB} MB"

        # rootfs için hedef: 6 MB (kernel ~5-6 MB bzImage ile toplamda <12 MB)
        MAX_KB=6144
        if [ "$SIZE_KB" -gt "$MAX_KB" ]; then
          echo "UYARI: rootfs ${SIZE_MB}MB > 6MB hedefi"
        else
          echo "OK: rootfs ${SIZE_MB}MB, kernel ile toplamda <12MB bekleniyor"
        fi

    - name: Artifact olarak yükle
      uses: actions/upload-artifact@v4
      with:
        name: rootfs-glibc-openrc-${{ github.sha }}
        path: rootfs.squashfs
        retention-days: 30

    - name: Özet rapor
      if: always()
      run: |
        echo "## RootFS Build Özeti" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Paket | Versiyon |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|----------|" >> $GITHUB_STEP_SUMMARY
        for pair in \
          "glibc:$GLIBC_VER" \
          "BusyBox:$BUSYBOX_VER" \
          "OpenRC:$OPENRC_VER" \
          "wget:$WGET_VER" \
          "curl:$CURL_VER" \
          "nano:$NANO_VER" \
          "git:$GIT_VER" \
          "OpenSSL:$OPENSSL_VER" \
          "zlib:$ZLIB_VER" \
          "libcap:$LIBCAP_VER"; do
          pkg="${pair%%:*}"; ver="${pair##*:}"
          echo "| $pkg | $ver |" >> $GITHUB_STEP_SUMMARY
        done
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f rootfs.squashfs ]; then
          SIZE=$(ls -lh rootfs.squashfs | awk '{print $5}')
          echo "**SquashFS:** $SIZE (xz sıkıştırmalı)" >> $GITHUB_STEP_SUMMARY
        fi
        echo "**Init:** OpenRC (/sbin/openrc-init)" >> $GITHUB_STEP_SUMMARY
        echo "**Libc:** glibc (dinamik)" >> $GITHUB_STEP_SUMMARY
        echo "**Kernel:** Dahil degil" >> $GITHUB_STEP_SUMMARY
